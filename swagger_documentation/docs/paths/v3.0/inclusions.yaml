paths:
  # /status and /readcube are undocumented in the v2.0 baseline (no v2.0 yaml entry, and not
  # in exclusions.yaml either) -- pyramid_openapi3's request validation 400s any openapi=True
  # view whose path has no spec entry at all, so leaving them undocumented would carry that
  # pre-existing gap into v3 too. Documenting them here (docs only, no behavior change) is
  # what actually makes these routes reachable under v3.
  /status:
    get:
      tags:
      - other
      summary: Status
      description: Diagnostic endpoint used for health checks.
      operationId: status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error
          content: {}
  /readcube:
    post:
      tags:
      - other
      summary: Readcube citation webhook
      description: Receives citation notifications from Readcube and records them against the referenced items.
      operationId: readcube_add_cites
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              required:
              - figshare_articles
              properties:
                figshare_articles:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                example: OK
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  # /echo and /whoami are undocumented in the v2.0 baseline too — so unlike the other 9
  # core/account routes, there's no v2 spec entry for exclusions.yaml to un-exclude; they
  # need a fresh entry here instead.
  /echo:
    get:
      tags:
      - other
      summary: Echo request
      description: Diagnostic endpoint that echoes a fixed payload for the authenticated account.
      operationId: echo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /whoami:
    get:
      tags:
      - other
      summary: Authenticated account information
      description: Returns the account information for the authenticated OAuth account.
      operationId: whoami
      responses:
        '200':
          description: OK. Account representation, nested under an `account` key.
          content:
            application/json:
              schema:
                type: object
                required:
                - account
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  # Undocumented in the v2.0 baseline too — no existing spec entry for exclusions.yaml to
  # un-exclude, so it needs a fresh entry here instead.
  /institutions/{string_id}/groups/{group_id}/submissions/{token}:
    put:
      tags:
      - institutions
      summary: Create institution submission token
      description: Creates a submission token for a given institution group, used by external submission integrations.
      operationId: institution_create_submission_token
      parameters:
      - name: string_id
        in: path
        description: Institution string identifier
        required: true
        schema:
          type: string
      - name: group_id
        in: path
        description: Group identifier
        required: true
        schema:
          type: integer
          minimum: 1
      - name: token
        in: path
        description: Submission token value
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK. Submission token created.
          content:
            application/json:
              schema:
                type: object
                required:
                - token
                properties:
                  token:
                    type: string
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /items:
    get:
      tags:
      - items
      summary: Public Items
      description: >-
        List public items from institutions with item-type based metadata enabled. Returns the light list shape (system fields + project_id +
        item_type); fetch `/v2/items/{item_id}` for the full detail including
        the `fields` object.
      operationId: items_public_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        description: Date keys differ from legacy. `posted_date` aliases the underlying `dates.published` field.
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
      - name: order_direction
        in: query
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      - name: institution
        in: query
        description: Only return items from this institution
        schema:
          type: integer
      - name: group
        in: query
        description: Only return items from this group
        schema:
          type: integer
      - name: item_type_id
        in: query
        description: Only return items of this item type
        schema:
          type: integer
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the requested institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security: []
  /items/search:
    post:
      tags:
      - items
      summary: Public Items Search
      description: Search public items. Same light list shape as `/v2/items`.
      operationId: items_public_search
      requestBody:
        description: Search Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleSearch'
        required: false
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the requested institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security: []
      x-codegen-request-body-name: search
  /account/items:
    get:
      tags:
      - items
      summary: Private Items
      description: >-
        List the caller's own items. Light list shape — fetch
        `/v2/account/items/{item_id}` for the full detail.
      operationId: account_items_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
      - name: order_direction
        in: query
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      - name: item_type_id
        in: query
        description: Only return items of this item type
        schema:
          type: integer
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the caller's institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    post:
      tags:
      - items
      summary: Create new Item
      description: >-
        Create a new Item by sending item information.
        Stock fields (journal, volume, etc.) are sent inside the `fields` object.
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
        `categories` input is a list of objects, each identified by either `id` (int) or `source_id` (string);
        entries may be mixed (`[{"id": 69}, {"source_id": "3001"}]`). Unresolved `source_id` values are reported
        in the response `warnings` array.
        `licence` input is a single object with an `id` key (`{"id": <int>}`).
        Bare integers are rejected with 422.
        Unrecognised field names inside `fields` (e.g. a typo) are rejected with 422.
      operationId: private_item_create
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarnings'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
      x-codegen-request-body-name: Item
  /account/items/search:
    post:
      tags:
      - items
      summary: Private Items Search
      description: Search the caller's own items. Same light list shape as `/v2/account/items`.
      operationId: account_items_search
      requestBody:
        description: Search Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleSearch'
        required: false
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the caller's institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
      x-codegen-request-body-name: search
  /items/{item_id}:
    get:
      tags:
      - items
      summary: Public item details
      description: View a public item. Metadata is returned under the `fields` object with relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`, `related_materials`). Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: public_item_details
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: >-
            OK. The item representation. Metadata is returned under the `fields` object with
            relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`,
            `related_materials`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemComplete'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
      security: []
  /account/items/{item_id}:
    get:
      tags:
      - items
      summary: Item details
      description: View a private item. Metadata is returned under the `fields` object with relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`, `related_materials`). Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: private_item_details
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: >-
            OK. The private item representation. Metadata is returned under the `fields` object with
            relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`,
            `related_materials`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCompletePrivate'
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    put:
      tags:
      - items
      summary: Update item
      description: >-
        Update an item by passing full body parameters.
        Stock fields are sent inside the `fields` object.
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
        `categories` entries accept `id` (int) or `source_id` (string), mixed allowed;
        `licence` input is `{"id": <int>}`. Bare integers are rejected.
      operationId: private_item_update
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '205':
          description: Reset Content
          headers:
            Location:
              description: Link to the updated item
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarningsUpdate'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    patch:
      tags:
      - items
      summary: Partially update item
      description: >-
        Partially update an item by sending only the keys to change.
        Send the keys to update inside `fields:{}` —
        keys not present are preserved. `categories` entries accept `id` (int) or `source_id` (string),
        mixed allowed; `licence` is `{"id": <int>}`. Bare integers are rejected.
        Unrecognised field names inside `fields` (e.g. a typo) are rejected with 422.
      operationId: private_item_partial_update
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '205':
          description: Reset Content
          headers:
            Location:
              description: Link to the updated item
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarningsUpdate'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    delete:
      tags:
      - items
      summary: Delete item
      description: Delete an item
      operationId: private_item_delete
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
  /account/items/fields:
    get:
      tags:
      - other
      summary: Item Field Definitions
      description: >-
        Returns the catalog of underlying field definitions (core, stock, custom) for items.
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: items_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/items/fields/configuration/{item_type_id}:
    get:
      tags:
      - other
      summary: Item Type Field Configuration
      description: >-
        Returns the fields configured for a specific item type, including per-type overrides
        (display_name, hint_text, is_mandatory, order, display_area, settings).
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: items_fields_configuration
      parameters:
      - name: item_type_id
        in: path
        description: Item type unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of item type field configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemTypeField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/projects/fields:
    get:
      tags:
      - other
      summary: Project Field Definitions
      description: >-
        Returns the catalog of underlying field definitions for projects.
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: projects_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/projects/fields/configuration:
    get:
      tags:
      - other
      summary: Project Field Configuration
      description: >-
        Returns the fields configured for projects, including per-type overrides
        (display_name, hint_text, is_mandatory, order, display_area, settings).
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: projects_fields_configuration
      parameters:
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of project field configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemTypeField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/collections/fields:
    get:
      tags:
      - other
      summary: Collection Field Definitions
      description: >-
        Returns the catalog of underlying field definitions for collections.
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: collections_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/collections/fields/configuration:
    get:
      tags:
      - other
      summary: Collection Field Configuration
      description: >-
        Returns the fields configured for collections, including per-type overrides
        (display_name, hint_text, is_mandatory, order, display_area, settings).
        Requires item-type based metadata to be enabled for the institution; returns 403 otherwise.
      operationId: collections_fields_configuration
      parameters:
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of collection field configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemTypeField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /projects:
    get:
      tags:
      - projects
      summary: Public Projects
      description: >-
        List public projects from institutions with item-type based metadata enabled. Returns the light list shape; fetch `/v3/projects/{project_id}`
        for the full detail including the `fields` object.
      operationId: projects_public_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        description: Date keys. Legacy keys (`published_date`, `modified_date`, `views`) are rejected for institutions with item-type based metadata enabled.
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
