paths:
  /items:
    get:
      tags:
      - items
      summary: Public ITBM Items
      description: >-
        List public items from institutions with item-type based metadata enabled
        (`itbm_enabled`). Returns the light list shape (system fields + project_id +
        item_type); fetch `/v2/items/{item_id}` for the full ITBM detail including
        the `fields` object.
      operationId: items_public_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        description: ITBM date keys differ from legacy. `posted_date` aliases the underlying `dates.published` field.
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
      - name: order_direction
        in: query
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      - name: institution
        in: query
        description: Only return items from this institution
        schema:
          type: integer
      - name: group
        in: query
        description: Only return items from this group
        schema:
          type: integer
      - name: item_type_id
        in: query
        description: Only return items of this ITBM item type
        schema:
          type: integer
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. ITBM is not enabled for the requested institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security: []
  /items/search:
    post:
      tags:
      - items
      summary: Public ITBM Items Search
      description: Search public ITBM items. Same light list shape as `/v2/items`.
      operationId: items_public_search
      requestBody:
        description: Search Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleSearch'
        required: false
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. ITBM is not enabled for the requested institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security: []
      x-codegen-request-body-name: search
  /account/items:
    get:
      tags:
      - items
      summary: Private ITBM Items
      description: >-
        List the caller's own ITBM items. Light list shape — fetch
        `/v2/account/items/{item_id}` for the full ITBM detail.
      operationId: account_items_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
      - name: order_direction
        in: query
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      - name: item_type_id
        in: query
        description: Only return items of this ITBM item type
        schema:
          type: integer
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. ITBM is not enabled for the caller's institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    post:
      tags:
      - items
      summary: Create new Item
      description: >-
        Create a new Item by sending item information.
        Stock fields (journal, volume, etc.) are sent inside the `fields` object.
        Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
        `categories` input is a list of objects, each identified by either `id` (int) or `source_id` (string);
        entries may be mixed (`[{"id": 69}, {"source_id": "3001"}]`). Unresolved `source_id` values are reported
        in the response `warnings` array.
        `licence` input is a single object with an `id` key (`{"id": <int>}`).
        Bare integers are rejected with 422.
        Unrecognised field names inside `fields` (e.g. a typo) are rejected with 422.
      operationId: private_item_create
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarnings'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
      x-codegen-request-body-name: Item
  /account/items/search:
    post:
      tags:
      - items
      summary: Private ITBM Items Search
      description: Search the caller's own ITBM items. Same light list shape as `/v2/account/items`.
      operationId: account_items_search
      requestBody:
        description: Search Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleSearch'
        required: false
      responses:
        '200':
          description: OK. An array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleWithProject'
        '403':
          description: Forbidden. ITBM is not enabled for the caller's institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
      x-codegen-request-body-name: search
  /items/{item_id}:
    get:
      tags:
      - items
      summary: Public item details
      description: View a public item. Metadata is returned under the `fields` object with relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`, `related_materials`). Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
      operationId: public_item_details
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: >-
            OK. The item representation. Metadata is returned under the `fields` object with
            relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`,
            `related_materials`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemComplete'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
      security: []
  /account/items/{item_id}:
    get:
      tags:
      - items
      summary: Item details
      description: View a private item. Metadata is returned under the `fields` object with relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`, `related_materials`). Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
      operationId: private_item_details
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: >-
            OK. The private item representation. Metadata is returned under the `fields` object with
            relational fields hydrated (`authors`, `categories`, `licence`, `funding_list`,
            `related_materials`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCompletePrivate'
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    put:
      tags:
      - items
      summary: Update item
      description: >-
        Update an item by passing full body parameters.
        Stock fields are sent inside the `fields` object.
        Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
        `categories` entries accept `id` (int) or `source_id` (string), mixed allowed;
        `licence` input is `{"id": <int>}`. Bare integers are rejected.
      operationId: private_item_update
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '205':
          description: Reset Content
          headers:
            Location:
              description: Link to the updated item
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarningsUpdate'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    patch:
      tags:
      - items
      summary: Partially update item
      description: >-
        Partially update an item by sending only the keys to change.
        Send the keys to update inside `fields:{}` —
        keys not present are preserved. `categories` entries accept `id` (int) or `source_id` (string),
        mixed allowed; `licence` is `{"id": <int>}`. Bare integers are rejected.
        Unrecognised field names inside `fields` (e.g. a typo) are rejected with 422.
      operationId: private_item_partial_update
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '205':
          description: Reset Content
          headers:
            Location:
              description: Link to the updated item
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarningsUpdate'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
  /account/items/fields:
    get:
      tags:
      - other
      summary: Item Field Definitions
      description: >-
        Returns the catalog of underlying field definitions (core, stock, custom) for items.
        Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
      operationId: items_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/items/fields/item-type/{item_type_id}:
    get:
      tags:
      - other
      summary: Item Type Field Configuration
      description: >-
        Returns the fields configured for a specific item type, including per-type overrides
        (display_name, hint_text, is_mandatory, order, display_area, settings).
        Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
      operationId: items_fields_by_item_type
      parameters:
      - name: item_type_id
        in: path
        description: Item type unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of item type field configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemTypeField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/projects/fields:
    get:
      tags:
      - other
      summary: Project Field Definitions
      description: >-
        Returns the catalog of underlying field definitions for projects.
        Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
      operationId: projects_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /account/collections/fields:
    get:
      tags:
      - other
      summary: Collection Field Definitions
      description: >-
        Returns the catalog of underlying field definitions for collections.
        Requires item-type based metadata (ITBM) to be enabled for the institution; returns 403 otherwise.
      operationId: collections_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /projects:
    get:
      tags:
      - projects
      summary: Public ITBM Projects
      description: >-
        List public projects from institutions with item-type based metadata enabled
        (`itbm_enabled`). Returns the light list shape; fetch `/v3/projects/{project_id}`
        for the full ITBM detail including the `fields` object.
      operationId: projects_public_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        description: ITBM date keys. Legacy keys (`published_date`, `modified_date`, `views`) are rejected for ITBM tenants.
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
          - start_date
          - finish_date
      - name: order_direction
        in: query
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      - name: institution
        in: query
        description: Only return projects from this institution
        schema:
          type: integer
      - name: group
        in: query
        description: Only return projects from this group
        schema:
          type: integer
      responses:
        '200':
          description: OK. An array of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '403':
          description: Forbidden. ITBM is not enabled for the requested institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity. Malformed `institution` or unsupported `order` for an ITBM tenant.
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security: []
  /projects/search:
    post:
      tags:
      - projects
      summary: Public ITBM Projects Search
      description: Search public ITBM projects. Same light list shape as `/v3/projects`.
      operationId: projects_public_search
      requestBody:
        description: Search Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectsSearch'
        required: false
      responses:
        '200':
          description: OK. An array of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '403':
          description: Forbidden. ITBM is not enabled for the requested institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity. Malformed `institution` or unsupported `order` for an ITBM tenant.
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security: []
      x-codegen-request-body-name: search
  /account/projects:
    get:
      tags:
      - projects
      summary: Private ITBM Projects
      description: >-
        List the caller's own ITBM projects (light list shape). 403 when ITBM is not
        enabled for the caller's institution; fetch `/v3/account/projects/{project_id}`
        for the full ITBM detail.
      operationId: private_projects_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          default: 10
      - name: limit
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - name: offset
        in: query
        schema:
          maximum: 5000
          minimum: 0
          type: integer
      - name: order
        in: query
        description: ITBM date keys. Legacy keys (`published_date`, `modified_date`, `views`) are rejected for ITBM tenants.
        schema:
          type: string
          default: created_date
          enum:
          - created_date
          - modified_date
          - posted_date
          - first_online
          - publisher_published
          - publisher_accepted
          - start_date
          - finish_date
      - name: order_direction
        in: query
        schema:
          type: string
          default: desc
          enum:
          - asc
          - desc
      - name: storage
        in: query
        description: Only return projects with this storage type
        schema:
          type: string
          enum:
          - group
          - individual
      - name: roles
        in: query
        description: 'Any combination of owner, collaborator, viewer separated by comma.'
        schema:
          type: string
      responses:
        '200':
          description: OK. An array of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectPrivate'
        '403':
          description: Forbidden. ITBM is not enabled for the caller's institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity. Unsupported `order`, `roles`, or `storage` for an ITBM tenant.
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
    post:
      tags:
      - projects
      summary: Create project
      description: >-
        Create a new ITBM project. All metadata is wrapped in a `fields` object
        (`title` is required; `description`, `funding_list`, and any configured
        custom fields are optional); `group_id` is the only top-level key. Legacy
        flat-payload top-level metadata is rejected with 422. `funding_list`
        entries accept either `{"id": <int>}` (reference an existing record)
        or `{"title": "..."}` (mint a new user-defined entry).
        Unrecognised field names inside `fields` (e.g. a typo) are rejected with 422.
      operationId: private_project_create
      requestBody:
        description: Project  description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden. Item-type based metadata (ITBM) is not enabled for the institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Project
      x-codegen-request-body-name: Project
  /account/projects/search:
    post:
      tags:
      - projects
      summary: Private ITBM Projects Search
      description: Search the caller's own ITBM projects. Same light list shape as `/v3/account/projects`.
      operationId: private_projects_search
      requestBody:
        description: Search Parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectsSearch'
        required: false
      responses:
        '200':
          description: OK. An array of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectPrivate'
        '403':
          description: Forbidden. ITBM is not enabled for the caller's institution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity. Unsupported `order`, `roles`, or `storage` for an ITBM tenant.
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-codegen-request-body-name: search
  /collections:
    get:
      tags:
      - collections
      summary: Public ITBM Collections
      description: >-
        List public collections from institutions with item-type based metadata enabled
        (`itbm_enabled`). Returns the light list shape; fetch `/v3/collections/{collection_id}`
        for the full ITBM detail including the `fields` object.
      operationId: collections_public_list
      parameters:
      - name: page
        in: query
        schema:
          maximum: 5000
          minimum: 1
          type: integer
      - name: page_size
        in: query
        schema:
