paths:
  /account/items:
    post:
      tags:
      - items
      summary: Create new Item
      description: >-
        Create a new Item by sending item information.
        ITBM-enabled institutions can include stock fields (journal, volume, etc.) inside the `fields` object.
        Non-ITBM institutions sending stock fields will receive a validation error.
      operationId: private_item_create
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarnings'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
      x-codegen-request-body-name: Item
  /items/{item_id}:
    get:
      tags:
      - items
      summary: Public item details
      description: View a public item. For ITBM-enabled items, the response includes a fields object with stock field values.
      operationId: public_item_details
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. Item representation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemComplete'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security: []
  /account/items/{item_id}:
    get:
      tags:
      - items
      summary: Item details
      description: View a private item. For ITBM-enabled items, the response includes a fields object with stock field values.
      operationId: private_item_details
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. Item representation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCompletePrivate'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    put:
      tags:
      - items
      summary: Update item
      description: >-
        Update an item by passing full body parameters.
        ITBM-enabled institutions can include stock fields inside the `fields` object.
        Non-ITBM institutions sending stock fields will receive a validation error.
      operationId: private_item_update
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '205':
          description: Reset Content
          headers:
            Location:
              description: Link to the updated item
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarningsUpdate'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
    patch:
      tags:
      - items
      summary: Partially update item
      description: >-
        Partially update an item by sending only the fields to change.
        ITBM-enabled institutions can include stock fields inside the `fields` object.
      operationId: private_item_partial_update
      parameters:
      - name: item_id
        in: path
        description: Item unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Item description
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
        required: true
      responses:
        '205':
          description: Reset Content
          headers:
            Location:
              description: Link to the updated item
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationWarningsUpdate'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '422':
          description: Unprocessable Entity
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Item
  /items/fields:
    get:
      tags:
      - other
      summary: Item Field Definitions
      description: >-
        Returns the catalog of underlying field definitions (core, stock, custom) for items.
        Requires an institutional account with the itbm_config feature flag enabled.
      operationId: items_fields_catalog
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /items/fields/{item_type_id}:
    get:
      tags:
      - other
      summary: Item Type Field Configuration
      description: >-
        Returns the fields configured for a specific item type, including per-type overrides
        (display_name, hint_text, is_mandatory, order, display_area, settings).
        Requires an institutional account with the itbm_config feature flag enabled.
      operationId: items_fields_by_item_type
      parameters:
      - name: item_type_id
        in: path
        description: Item type unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of item type field configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemTypeField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /projects/fields:
    get:
      tags:
      - other
      summary: Project Field Definitions
      description: >-
        Returns the catalog of underlying field definitions for projects.
        Requires an institutional account with the itbm_config feature flag enabled.
      operationId: projects_fields_catalog
      parameters:
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
  /collections/fields:
    get:
      tags:
      - other
      summary: Collection Field Definitions
      description: >-
        Returns the catalog of underlying field definitions for collections.
        Requires an institutional account with the itbm_config feature flag enabled.
      operationId: collections_fields_catalog
      parameters:
      - name: group_id
        in: query
        description: Filter fields by group applicability
        schema:
          minimum: 1
          type: integer
      responses:
        '200':
          description: OK. An array of underlying field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnderlyingField'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
