# v3-only component additions (merged after the v2.0 baseline and exclusions).
schemas:
  ItemsCreator:
    required:
    - items
    type: object
    properties:
      items:
        type: array
        description: List of item ids
        example:
        - 2000003
        - 2000004
        items:
          type: integer
  # v3 British-spelled licence catalogue object (v2 keeps `License`). Same shape as `License`.
  Licence:
    required:
    - name
    - url
    - value
    type: object
    properties:
      value:
        type: integer
        description: Licence value
      name:
        type: string
        description: Licence name
      url:
        type: string
        description: Licence url
        format: url
